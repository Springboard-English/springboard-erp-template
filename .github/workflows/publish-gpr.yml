name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@Springboard-English"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Type check
        run: npx tsc

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify consumer repos
        if: success()
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          VERSION: ${{ github.event.release.tag_name || 'latest' }}
        run: |
          for repo in erp-crm erp-hrm lms.springboard.vn; do
            gh api repos/Springboard-English/$repo/dispatches \
              --method POST \
              -f event_type=template-published \
              -f "client_payload[version]=$VERSION" || \
              echo "Warning: dispatch to $repo failed (repo may not have the workflow yet)"
          done
